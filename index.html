<style>

.main{position:relative;overflow:hidden;min-height:0}

.field-menu.open{display:block}

.filter-bar.open{display:flex}.chip{font-size:11px;padding:7px 10px;border-radius:12px;background:var(--bg);border:1px solid var(--border);cursor:pointer;color:var(--text);white-space:nowrap}.chip.active{background:var(--accent);border-color:var(--accent);color:white}.chip .count{opacity:.65;margin-left:4px}

.nav-btn{flex:1;padding:10px 5px;background:transparent;border:0;color:var(--muted);font-size:11px;font-weight:800}.nav-btn.active{color:var(--blue)}.nav-btn .ico{display:block;font-size:18px;margin-bottom:2px}

.lead-item,.mini-item,.agent-row{padding:11px;border:1px solid var(--border);border-radius:14px;background:var(--panel2);margin-bottom:8px;cursor:pointer}.lead-item .nm,.mini-item .nm,.agent-row .nm{font-size:13px;font-weight:1000}.lead-item .ad,.mini-item .meta,.agent-row .meta{font-size:11px;color:var(--muted);margin-top:3px;line-height:1.35}.row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px}.badge{font-size:9px;text-transform:uppercase;font-weight:1000;padding:3px 8px;border-radius:999px;background:#21262d;color:var(--muted)}.badge.hot{background:#3fb95022;color:var(--green)}.badge.blue{background:#1f6feb22;color:var(--blue)}.badge.gold{background:#d2992222;color:var(--yellow)}.badge.red{background:#f8514922;color:var(--red)}.badge.purple{background:#a371f722;color:var(--purple)}

/* M2 Agent Ready Upgrade */

/* M2 Manager Pro Upgrade */

/* Block Mode Pro Upgrade */
.block-status-card{position:absolute;top:58px;right:12px;z-index:515;width:min(330px,calc(100vw - 24px));background:rgba(22,27,34,.96);border:1px solid var(--border);border-radius:16px;padding:10px;box-shadow:0 12px 34px rgba(0,0,0,.42);backdrop-filter:blur(12px);display:none}

/* Field Productivity Pro Upgrade: EOD report, coaching alerts, territory heat */

.coach-alert.danger{border-color:#da3633;background:rgba(218,54,51,.08)}
.coach-alert.good{border-color:#3fb950;background:rgba(63,185,80,.08)}
.coach-alert b{display:block;font-size:12px;color:#f0f6fc}.coach-alert span{display:block;font-size:11px;color:var(--muted);margin-top:3px;line-height:1.35}
.heat-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:8px}
.heat-row{border:1px solid var(--border);background:#0d1117;border-radius:12px;padding:9px;cursor:pointer}
.heat-top{display:flex;justify-content:space-between;gap:8px;align-items:center}.heat-top b{font-size:12px}.heat-top span{font-size:10px;color:var(--muted);font-weight:900}
.heat-meter{height:9px;background:#010409;border:1px solid var(--border);border-radius:99px;overflow:hidden;margin:7px 0}.heat-meter div{height:100%;background:linear-gradient(90deg,#1f6feb,#3fb950,#f9c74f)}
.heat-tags{display:flex;flex-wrap:wrap;gap:5px}.heat-tags .badge{font-size:9px}
.report-box{white-space:pre-wrap;background:#0d1117;border:1px solid var(--border);border-radius:12px;padding:12px;color:#dbe7ff;font-size:12px;line-height:1.45;max-height:55vh;overflow:auto}

</style>
</head>
<body>
<!-- M2 CRM Manager Pro Cloud: delete agents + performance dashboard + follow-up board -->
<div class="app">
<header class="topbar">
  <div class="logo">M2</div>
  <div class="title"><b id="brandTitle">M2 Energy CRM</b><span id="sessionLine">Original stack restored · Solar + HVAC + Field Team</span></div>
  <div class="top-actions">
    <button class="pill-btn hide-sm" id="openLaunch">🚀 Launch</button>
    <button class="pill-btn blue" id="openLogin">Login</button>
    <button class="pill-btn gold" id="exportTop">Backup</button>
  </div>
</header>
<main class="main">
  <div id="map"></div>
  <button class="filter-toggle" id="filterToggle">Filter: All ▾</button>
  <div class="filter-bar" id="filterBar"></div>
  <div class="progress" id="progress"><div class="ttl" id="progTitle">Loading…</div><div class="sub" id="progSub">Starting</div><div class="track"><div class="fill" id="progFill"></div></div><button class="save-btn secondary" id="cancelLoad">Cancel</button></div>
  <div class="block-status-card" id="blockStatusCard"></div>
  <div class="field-dock">
    <div class="field-tools">
      <button class="field-toggle" id="fieldToggle">⚡ Field Tools</button>
      <div class="field-menu" id="fieldMenu">
        <div class="field-menu-head"><b>Field Rep Tools</b><span>old-style clean menu</span></div>
        <div class="field-grid">
          <button class="gold" data-tool="today">⚡ Today Mode</button>
          <button class="green" data-tool="next">🎯 Next Best</button>
          <button class="gold" data-tool="toggleBlockMode">🏘️ Block Mode</button>
          <button class="blue" data-tool="blockDashboard">📊 Block Board</button>
          <button class="blue" data-tool="locate">📍 Locate Me</button>
          <button data-tool="satellite">🛰️ Satellite</button>
          <button data-tool="walk">🚶 Walk Route</button>
          <button data-tool="fit">🗺️ Fit Leads</button>
          <button class="purple" data-tool="add">➕ Add Lead</button>
          <button class="green" data-tool="loadArea">⬇ Load Area</button>
          <button data-tool="neighborhoods">📍 Neighborhoods</button>
        </div>
      </div>
    </div>
    <button class="next-best-pill" id="nextBestPill">🎯 Next Best</button>
  </div>
  <div class="info-tag" id="infoTag">Live map is always on. Use Field Tools → Load Area for mobile-safe NYC PLUTO homeowner pins. Zoom in on a block first.</div>
  <section class="panel-view" id="listView"><div id="listContainer"></div></section>
  <section class="panel-view" id="statsView"></section>
</main>
<nav class="bottom-nav">
  <button class="nav-btn active" data-view="map"><span class="ico">🗺️</span>Map</button>
  <button class="nav-btn" data-view="list"><span class="ico">📋</span>Leads</button>
  <button class="nav-btn" data-view="stats"><span class="ico">📊</span>Stats</button>
</nav>
</div>

<div class="sheet" id="sheet"><div class="sheet-handle" id="sheetHandle"></div><div class="sheet-header"><div class="info"><h2 id="shName">—</h2><div class="addr" id="shAddr">—</div></div><button class="sheet-close" id="closeSheet">×</button></div><div class="sheet-body" id="sheetBody"></div></div>
<div class="login-overlay" id="loginOverlay"></div>
<div class="modal" id="modal"></div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const STORE='m2_original_stack_restored_v1';
const SETTINGS='m2_settings_restored_v1';
const ACCOUNT='m2_account_access_restored_v1';
const SESSION='m2_session_restored_v1';
const BACKUPS='m2_backups_restored_v1';
const CHECKS='m2_checks_restored_v1';
const SUBS='m2_customer_accounts_restored_v1';
const CONTACT='m2_demo_contact_restored_v1';
const AFTER='m2_after_disposition_restored_v1';
const PLUTO='https://data.cityofnewyork.us/resource/64uk-42ks.json';
let state=loadState(), markers={}, draftMarker=null, loadCancelled=false, currentLeadId=null, satellite=false, routeOn=false, routeLine=null, routePoints=[];
const DISP=[['knocked','✊','Knocked'],['not_home','🚪','Not Home'],['interested','🔥','Interested'],['callback','📞','Callback'],['set','🎯','Appt Set'],['sat','🪑','Sat'],['closed','💰','Closed'],['not_qualified','⚠️','Not Qualified'],['do_not_knock','⛔','Do Not Knock'],['not_interested','❌','Not Interested']];
const LABEL={fresh:'Fresh',knocked:'Knocked',not_home:'Not Home',interested:'Interested',callback:'Callback',set:'Appt Set',sat:'Sat',closed:'Closed',not_qualified:'Not Qualified',do_not_knock:'Do Not Knock',not_interested:'Not Interested'};
const NEIGHBORHOODS={
  queens:[['Rosedale / Laurelton',[40.650,-73.775,40.690,-73.725]],['Jamaica / Hollis',[40.690,-73.810,40.720,-73.760]],['Queens Village',[40.710,-73.770,40.745,-73.720]],['Bayside / Whitestone',[40.760,-73.800,40.795,-73.745]],['Flushing',[40.745,-73.840,40.785,-73.795]],['Ozone Park',[40.670,-73.860,40.695,-73.830]],['Forest Hills',[40.715,-73.860,40.735,-73.830]]],
  brooklyn:[['Canarsie',[40.620,-73.910,40.650,-73.870]],['Flatlands',[40.620,-73.945,40.640,-73.910]],['Marine Park',[40.595,-73.945,40.625,-73.900]],['Bed-Stuy',[40.680,-73.960,40.700,-73.920]],['Crown Heights',[40.665,-73.960,40.685,-73.920]]]
};
function loadState(){try{return JSON.parse(localStorage.getItem(STORE))||{leads:[],filter:'all'}}catch(e){return{leads:[],filter:'all'}}}
function compactLeadForStorage(l,level=1){
  l=l||{};
  const keep=['id','first','last','owner','entity','phone','email','addr','address','city','boro','zip','lat','lng','status','source','territory','assigned_agent','assigned_user_email','monthly_bill','heating_bill','credit','roof_notes','solar_status','heating_type','hvac_opportunity','callback_due','appt_time','bbl','sun_score','quality','updated_at','created_at','solar_visible','utility_bill_file'];
  const o={}; keep.forEach(k=>{if(l[k]!==undefined&&l[k]!==null&&l[k]!=='' )o[k]=l[k]});
  if(l.notes)o.notes=String(l.notes).slice(0,level>1?450:1800);
  if(Array.isArray(l.activity_log))o.activity_log=l.activity_log.slice(level>1?-6:-25).map(x=>({type:x.type||'',at:x.at||'',agent:x.agent||'',note:String(x.note||'').slice(0,120)}));
  return o;
}
function compactStateForStorage(level=1){return {...state,leads:(state.leads||[]).map(l=>compactLeadForStorage(l,level))}}
function saveState(){
  try{localStorage.setItem(STORE,JSON.stringify(compactStateForStorage(1)));return true}
  catch(e){
    try{localStorage.setItem(STORE,JSON.stringify(compactStateForStorage(2)));toast('Phone storage was tight — saved compact lead data.');return true}
    catch(e2){
      console.warn('Local save skipped because browser storage quota is full',e2);
      try{localStorage.setItem('m2_storage_warning_v1','Phone storage quota hit. Data is still in memory; sync to Supabase.')}catch(_){}
      try{toast('Phone storage full — cloud data loaded in memory. Sync/backup before closing.')}catch(_){}
      return false
    }
  }
}
function settings(){try{return JSON.parse(localStorage.getItem(SETTINGS))||{company:'M2 Energy CRM',agent_name:'Shaquille',territory:'Queens / Long Island',door_goal:25,appt_goal:2,plan:'Growth',include_llc:true,allow_verify:true}}catch(e){return{}}}
function saveSettings(s){localStorage.setItem(SETTINGS,JSON.stringify({...settings(),...s}));renderBrand()}
function account(){try{return JSON.parse(localStorage.getItem(ACCOUNT))||{master_name:'Shaquille',master_email:'',master_pin:'',agents:[]}}catch(e){return{agents:[]}}}
function saveAccount(a){localStorage.setItem(ACCOUNT,JSON.stringify(a))}
function session(){try{return JSON.parse(localStorage.getItem(SESSION))||{role:'master',name:settings().agent_name||'Shaquille'}}catch(e){return{role:'master',name:'Shaquille'}}}
function saveSession(s){localStorage.setItem(SESSION,JSON.stringify(s));renderBrand();renderAll()}
function contact(){try{return JSON.parse(localStorage.getItem(CONTACT))||{name:'Shaquille Regis',email:'shaquilleregis23@gmail.com',phone:'',booking:'',cta:'DM CRM for a demo'}}catch(e){return{}}}
function saveContact(c){localStorage.setItem(CONTACT,JSON.stringify(c))}
function checks(){try{return JSON.parse(localStorage.getItem(CHECKS))||{}}catch(e){return{}}}
function saveChecks(c){localStorage.setItem(CHECKS,JSON.stringify(c))}
function subs(){try{return JSON.parse(localStorage.getItem(SUBS))||[]}catch(e){return[]}}
function saveSubs(s){localStorage.setItem(SUBS,JSON.stringify(s))}
function role(){return session().role||'master'}
function isMaster(){return role()!=='agent'}
function requireMaster(msg='Master/admin only. Agents can update assigned leads, but cannot access admin tools.'){if(!isMaster()){toast('🔒 '+msg);return false}return true}
function saveAutoBackup(reason='backup'){try{let payload={app:'M2 Energy CRM',reason,exported_at:new Date().toISOString(),state:compactStateForStorage?compactStateForStorage(2):state,settings:settings(),account:account(),session:session(),customer_accounts:subs(),contact:contact()};let arr=[];try{arr=JSON.parse(localStorage.getItem(BACKUPS)||'[]')}catch(_){arr=[]}arr.unshift(payload);localStorage.setItem(BACKUPS,JSON.stringify(arr.slice(0,2)));return payload}catch(e){console.warn('backup skipped',e);return null}}
function syncMeta(){try{return JSON.parse(localStorage.getItem('m2_sync_meta_v1'))||{}}catch(e){return{}}}
function saveSyncMeta(m){localStorage.setItem('m2_sync_meta_v1',JSON.stringify({...syncMeta(),...m}))}

const BLOCKMODE='m2_block_mode_v1', BLOCKCURRENT='m2_current_block_v1';
function blockMode(){return localStorage.getItem(BLOCKMODE)==='on'}
function setBlockMode(on){localStorage.setItem(BLOCKMODE,on?'on':'off');document.body.classList.toggle('block-mode-on',!!on);updateBlockStatus();toast(on?'🏘️ Block Mode on':'Block Mode off')}
function currentBlockKey(){return localStorage.getItem(BLOCKCURRENT)||''}
function setCurrentBlockFromLead(l){let s=normStreet(l&&l.addr);if(s)localStorage.setItem(BLOCKCURRENT,s);updateBlockStatus()}
function isWorkedStatus(s){return ['knocked','not_home','interested','callback','set','sat','closed','not_qualified','do_not_knock','not_interested'].includes(s||'')}
function blockLeads(key=currentBlockKey()){let k=key||'';if(!k)return[];return scopedLeads().filter(l=>normStreet(l.addr)===k).sort((a,b)=>(houseNum(a.addr)||0)-(houseNum(b.addr)||0))}
function streetGroups(){let map={};scopedLeads().forEach(l=>{let k=normStreet(l.addr);if(!k)return;(map[k]=map[k]||[]).push(l)});return Object.entries(map).map(([key,leads])=>{let worked=leads.filter(l=>isWorkedStatus(l.status)).length, open=leads.filter(isOpenLead).length, hot=leads.filter(l=>leadQuality(l)>=70).length, appts=leads.filter(l=>['set','sat','closed'].includes(l.status)).length;let pct=leads.length?Math.round(worked/leads.length*100):0;let label=pct===0?'Not Started':pct>=100?'Completed':open?'In Progress':'Needs Return';return{key,street:key.replace(/\w/g,m=>m.toUpperCase()),leads,total:leads.length,worked,open,hot,appts,pct,label}}).sort((a,b)=>b.open-a.open||b.hot-a.hot||b.total-a.total)}
function blockSummary(key=currentBlockKey()){let arr=blockLeads(key);return{total:arr.length,worked:arr.filter(l=>isWorkedStatus(l.status)).length,open:arr.filter(isOpenLead).length,knocked:arr.filter(l=>l.status==='knocked').length,not_home:arr.filter(l=>l.status==='not_home').length,interested:arr.filter(l=>l.status==='interested').length,callbacks:arr.filter(l=>l.status==='callback').length,set:arr.filter(l=>l.status==='set').length,closed:arr.filter(l=>l.status==='closed').length,dnk:arr.filter(l=>l.status==='do_not_knock').length}}
function updateBlockStatus(){try{document.body.classList.toggle('block-mode-on',blockMode());let card=document.getElementById('blockStatusCard');if(!card)return;let key=currentBlockKey();if(!blockMode()||!key){card.classList.remove('on');return}let s=blockSummary(key), pct=s.total?Math.round(s.worked/s.total*100):0;card.classList.add('on');card.innerHTML=`<div class="block-status-head"><b>🏘️ Block Mode</b><span>${esc(key.replace(/\w/g,m=>m.toUpperCase()))}</span></div><div class="block-bar"><div class="block-bar-fill" style="width:${pct}%"></div></div><div class="block-mini"><div><b>${s.worked}/${s.total}</b><span>Progress</span></div><div><b>${s.open}</b><span>Open</span></div><div><b>${s.interested+s.callbacks+s.set}</b><span>Warm</span></div><div><b>${s.closed}</b><span>Closed</span></div></div>`}catch(e){}}
function renderBlockDashboard(){let key=currentBlockKey(), sum=blockSummary(key), groups=streetGroups().slice(0,25);return `<div class="card"><h3>🏘️ Block Mode + Street Progress</h3><p class="sub">Keeps reps moving house-to-house on the same block. After each disposition, Save & Next opens the next available address on that street first.</p><div class="metric-grid"><div class="metric"><div class="k">Block Mode</div><div class="v" style="font-size:15px">${blockMode()?'ON':'OFF'}</div></div><div class="metric"><div class="k">Current Block</div><div class="v" style="font-size:12px">${esc(key?key.replace(/\w/g,m=>m.toUpperCase()):'None')}</div></div><div class="metric"><div class="k">Progress</div><div class="v">${sum.worked}/${sum.total}</div></div><div class="metric"><div class="k">Open</div><div class="v">${sum.open}</div></div></div><div class="action-grid"><button class="gold" data-action="toggleBlockMode">${blockMode()?'Turn Block Mode Off':'Turn Block Mode On'}</button><button class="green" data-action="openNextBlockLead">Open Next Block Lead</button><button class="blue" data-action="copyBlockReport">Copy Block Report</button><button data-action="clearCurrentBlock">Clear Block</button></div><table class="street-table"><thead><tr><th>Street</th><th>Progress</th><th>Open</th><th>Hot</th><th>Status</th></tr></thead><tbody>${groups.map(g=>`<tr class="street-row" data-action="setBlockStreet" data-street="${esc(g.key)}"><td>${esc(g.street)}</td><td>${g.worked}/${g.total}<div class="street-progress"><div style="width:${g.pct}%"></div></div></td><td>${g.open}</td><td>${g.hot}</td><td><span class="badge ${g.label==='Completed'?'hot':g.label==='In Progress'?'blue':'gold'}">${g.label}</span></td></tr>`).join('')||'<tr><td colspan="5">No street groups yet.</td></tr>'}</tbody></table></div>`}
function blockReport(){let key=currentBlockKey(), s=blockSummary(key);return `Block Report: ${key||'No block selected'}
Progress: ${s.worked}/${s.total}
Open: ${s.open}
Knocked: ${s.knocked}
Not Home: ${s.not_home}
Interested: ${s.interested}
Callbacks: ${s.callbacks}
Appointments: ${s.set}
Closed: ${s.closed}
Do Not Knock: ${s.dnk}`}

function agentName(){return session().name||settings().agent_name||'Shaquille'}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function toast(msg){let t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(window._t);window._t=setTimeout(()=>t.classList.remove('show'),2200)}
function info(msg){document.getElementById('infoTag').textContent=msg}
function renderBrand(){let s=settings(), sess=session();document.body.classList.toggle('agent-session',(sess.role||'master')==='agent');document.getElementById('brandTitle').textContent=s.company||'M2 Energy CRM';document.getElementById('sessionLine').textContent=`${sess.name||'Master'} · ${sess.role||'master'} · ${s.territory||'No territory'}`}
renderBrand();

const map=L.map('map',{zoomControl:false,preferCanvas:true}).setView([40.6815,-73.9301],12);
const dark=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:19,subdomains:'abcd'});
const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19});
const labels=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png',{attribution:'',maxZoom:19,subdomains:'abcd',opacity:.9});
dark.addTo(map);L.control.zoom({position:'bottomright'}).addTo(map);
function scopedLeads(){let sess=session();let arr=state.leads||[];if(sess.role==='agent'){let e=String(sess.email||'').toLowerCase(),n=String(sess.name||'').toLowerCase();arr=arr.filter(l=>String(l.assigned_user_email||'').toLowerCase()===e||String(l.assigned_agent||'').toLowerCase()===n)}return arr}
function filterLeads(arr=scopedLeads()){let f=state.filter||'all';if(f==='all')return arr;if(f==='hot')return arr.filter(l=>leadQuality(l)>=70);if(f==='high_sun')return arr.filter(l=>sunScore(l)>=75);if(f==='manual')return arr.filter(l=>l.source==='manual');if(f==='pluto')return arr.filter(l=>l.source==='pluto');if(f==='imported')return arr.filter(l=>l.source==='imported');if(f==='entity')return arr.filter(l=>l.entity);if(f==='assigned')return arr.filter(l=>l.assigned_agent||l.assigned_user_email);return arr.filter(l=>(l.status||'fresh')===f)}
function statusBadge(s){if(['closed','knocked'].includes(s))return'hot';if(['set','sat','interested'].includes(s))return'blue';if(s==='callback')return'gold';if(['not_qualified','do_not_knock','not_interested'].includes(s))return'red';return''}
function sunScore(l){if(l.sun_score!==undefined&&l.sun_score!=='')return Math.max(0,Math.min(100,Math.round(+l.sun_score||0)));let s=42, r=[];if((l.solar_status||'').includes('has'))s-=35;else{s+=14;r.push('no solar noted')}if((l.bldg_class||'').startsWith('A'))s+=12;if((l.bldg_class||'').startsWith('B'))s+=9;if(+l.monthly_bill>=250)s+=13;else if(+l.monthly_bill>=150)s+=9;if(+l.units>0&&+l.units<=2)s+=6;if(String(l.roof_notes||l.notes||'').match(/good|new|flat|sun|clear/i))s+=12;if(String(l.roof_notes||l.notes||'').match(/shade|tree|bad|old|repair/i))s-=18;if(['interested','callback','set','sat'].includes(l.status))s+=8;if(['not_qualified','do_not_knock','not_interested'].includes(l.status))s-=25;return Math.max(0,Math.min(100,Math.round(s)))}
function leadQuality(l){let q=25+Math.round(sunScore(l)*.35);if(+l.monthly_bill>=180)q+=15;if(['interested','callback','set','sat'].includes(l.status))q+=18;if((l.solar_status||'').includes('no'))q+=10;if(String(l.heating_type||'').match(/oil|gas|boiler/i))q+=8;if(String(l.hvac_opportunity||'').match(/mini|boiler|heat|window|comfort/i))q+=8;if(['closed','not_interested','do_not_knock','not_qualified'].includes(l.status))q-=80;return Math.max(0,Math.min(100,q))}
function markerClass(l){let q=leadQuality(l), extra=currentLeadId===l.id?' sun-selected':'';if(['do_not_knock','not_qualified','not_interested'].includes(l.status))return'sun-lost'+extra;if(q>=70)return'sun-hot'+extra;if(q>=45)return'sun-warm'+extra;return'sun-cold'+extra}
function leadIcon(l){return L.divIcon({className:'',html:`<div class="sun-marker ${markerClass(l)}"></div>`,iconSize:[34,34],iconAnchor:[17,17],popupAnchor:[0,-18]})}
function renderMarkers(){Object.values(markers).forEach(m=>map.removeLayer(m));markers={};filterLeads().slice(0,6000).forEach(l=>{if(!l.lat||!l.lng)return;let m=L.marker([+l.lat,+l.lng],{icon:leadIcon(l)}).addTo(map);m.on('click',()=>openLead(l.id));m.bindPopup(`<b>${esc(nameOf(l))}</b><br>${esc(l.addr||'')}<br>☀ ${sunScore(l)} · Q${leadQuality(l)} · ${LABEL[l.status||'fresh']}`);markers[l.id]=m})}
function updateMarker(l){if(markers[l.id])markers[l.id].setIcon(leadIcon(l))}
function nameOf(l){return `${l.first||''} ${l.last||''}`.trim()||l.last||l.addr||'Lead'}
function renderFilter(){let bar=document.getElementById('filterBar'), arr=scopedLeads();let filters=[['all','All'],['hot','🔥 Hot'],['high_sun','☀️ Sun'],['fresh','Fresh'],['knocked','Knock'],['not_home','Not Home'],['interested','Interested'],['callback','Callback'],['set','Set'],['sat','Sat'],['closed','Closed'],['do_not_knock','DNK'],['pluto','PLUTO'],['manual','Manual'],['imported','CSV'],['entity','LLC'],['assigned','Assigned']];let counts={};filters.forEach(([k])=>counts[k]=filterLeadsBy(k,arr).length);let active=filters.find(x=>x[0]===state.filter)||filters[0];document.getElementById('filterToggle').textContent=`Filter: ${active[1]} ${counts[active[0]]||0} ▾`;bar.innerHTML=filters.map(([k,l])=>`<div class="chip ${state.filter===k?'active':''}" data-filter="${k}">${l}<span class="count">${counts[k]||0}</span></div>`).join('');bar.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{state.filter=c.dataset.filter;saveState();bar.classList.remove('open');renderAll()})}
function filterLeadsBy(f,arr){let old=state.filter;state.filter=f;let res=filterLeads(arr);state.filter=old;return res}
function renderList(){let c=document.getElementById('listContainer'), arr=filterLeads().slice().sort((a,b)=>leadQuality(b)-leadQuality(a));if(!arr.length){c.innerHTML='<div class="card"><h3>No leads yet</h3><p class="sub">Use Field Tools → Load Area, Neighborhoods, Add Lead, or import CSV.</p></div>';return}c.innerHTML=arr.slice(0,700).map(l=>`<div class="lead-item" data-id="${l.id}"><div class="nm">${esc(nameOf(l))} ${l.entity?'🏢':''}</div><div class="ad">${esc(l.addr||'')} ${l.boro?`· ${esc(l.boro)}`:''}</div><div class="row"><span class="badge ${statusBadge(l.status)}">${LABEL[l.status||'fresh']}</span><span class="badge gold">☀ ${sunScore(l)}</span><span class="badge blue">Q${leadQuality(l)}</span>${l.assigned_agent?`<span class="badge hot">👤 ${esc(l.assigned_agent)}</span>`:''}</div></div>`).join('');c.querySelectorAll('.lead-item').forEach(i=>i.onclick=()=>{let l=state.leads.find(x=>x.id===i.dataset.id);switchView('map');if(l.lat&&l.lng)map.setView([+l.lat,+l.lng],18);setTimeout(()=>openLead(l.id),180)})}
function todayLeads(){let d=new Date().toDateString();return scopedLeads().filter(l=>l.updated_at&&new Date(l.updated_at).toDateString()===d)}

function normStreet(addr){
  addr=String(addr||'').toLowerCase().replace(/#/g,' ').replace(/,/g,' ');
  addr=addr.replace(/\b(apt|unit|fl|floor|ste|suite)\b.*$/,'');
  addr=addr.replace(/\b(new york|ny|queens|brooklyn|bronx|staten island|manhattan|rosedale|jamaica|elmont|valley stream)\b.*$/,'');
  addr=addr.replace(/\b\d{5}(?:-\d{4})?\b/g,'');
  addr=addr.replace(/^\s*\d+[a-z]?[-\s]*/,'');
  addr=addr.replace(/\b(street)\b/g,'st').replace(/\b(avenue)\b/g,'ave').replace(/\b(road)\b/g,'rd').replace(/\b(boulevard)\b/g,'blvd').replace(/\b(place)\b/g,'pl').replace(/\b(drive)\b/g,'dr').replace(/\b(lane)\b/g,'ln').replace(/\b(court)\b/g,'ct');
  return addr.replace(/[^a-z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
}
function houseNum(addr){let m=String(addr||'').match(/^\s*(\d+)/);return m?parseInt(m[1],10):null}
function isOpenLead(l){return l && !['closed','not_interested','do_not_knock','not_qualified'].includes(l.status)}
function nextLeadOnBlock(current){
  if(!current||!current.addr)return null;
  let street=(blockMode()&&currentBlockKey())?currentBlockKey():normStreet(current.addr), num=houseNum(current.addr);
  if(!street||num===null)return null;
  let candidates=scopedLeads().filter(l=>l.id!==current.id && isOpenLead(l) && normStreet(l.addr)===street && houseNum(l.addr)!==null);
  if(!candidates.length)return null;
  candidates.sort((a,b)=>{
    let na=houseNum(a.addr), nb=houseNum(b.addr);
    let sameSideA=(na%2)===(num%2), sameSideB=(nb%2)===(num%2);
    let aheadA=na>num, aheadB=nb>num;
    if(sameSideA!==sameSideB)return sameSideA?-1:1;
    if(aheadA!==aheadB)return aheadA?-1:1;
    return Math.abs(na-num)-Math.abs(nb-num) || leadQuality(b)-leadQuality(a);
  });
  return candidates[0]||null;
}
function nextAfterDisposition(current){return nextLeadOnBlock(current)||nextBestLead()}

async function loadPlutoBounds(bounds,name='this area'){
  loadCancelled=false;
  const prog=document.getElementById('progress'), fill=document.getElementById('progFill'), sub=document.getElementById('progSub');
  prog?.classList.add('open');
  const titleEl=document.getElementById('progTitle');
  if(titleEl) titleEl.textContent=`Mobile-safe PLUTO load: ${name}`;
  if(fill) fill.style.width='0%';

  const isMobile=/iPhone|iPad|iPod|Android|Mobile/i.test(navigator.userAgent)||innerWidth<760;
  const maxAdd=isMobile?750:3000;
  const tileCount=isMobile?3:2;
  const perTileLimit=isMobile?250:1000;
  const timeoutMs=isMobile?12000:18000;
  const existing=new Set(state.leads.map(l=>l.bbl).filter(Boolean));
  let added=0, skipped=0, fetched=0, tilesDone=0;

  function compactPlutoLead(l){
    if(!l) return l;
    // Keep the CRM fields reps need; avoid heavy/unknown payloads that blow up iPhone storage.
    delete l.raw_data; delete l.raw; delete l.geometry; delete l.the_geom; delete l.full_record;
    if(l.raw_owner && String(l.raw_owner).length>90) l.raw_owner=String(l.raw_owner).slice(0,90);
    return l;
  }
  async function fetchWithTimeout(url,ms){
    const ctrl=new AbortController();
    const t=setTimeout(()=>ctrl.abort(),ms);
    try{
      const r=await fetch(url,{signal:ctrl.signal});
      if(!r.ok) throw new Error(`NYC data ${r.status}`);
      return await r.json();
    }finally{clearTimeout(t)}
  }
  function safeSaveAfterPluto(){
    try{saveState();return true}catch(e){
      // Last-resort mobile cleanup: trim low-value PLUTO extras and retry once.
      state.leads=state.leads.map(l=>l.source==='pluto'?compactPlutoLead(l):l);
      try{saveState();return true}catch(err){
        toast('Phone storage full — loaded fewer PLUTO pins');
        info('PLUTO mobile save limit reached. Try a smaller zoomed-in block.');
        return false;
      }
    }
  }

  try{
    const south=+bounds[0], west=+bounds[1], north=+bounds[2], east=+bounds[3];
    const latStep=(north-south)/tileCount, lngStep=(east-west)/tileCount;
    const totalTiles=tileCount*tileCount;
    if(sub) sub.textContent=isMobile?'Phone mode: loading smaller PLUTO batches…':'Loading PLUTO records in safe batches…';

    for(let yi=0; yi<tileCount; yi++){
      for(let xi=0; xi<tileCount; xi++){
        if(loadCancelled || added>=maxAdd) break;
        const s=south+(latStep*yi), n=south+(latStep*(yi+1));
        const w=west+(lngStep*xi), e=west+(lngStep*(xi+1));
        const where=[
          `latitude > ${s}`,`latitude < ${n}`,`longitude > ${w}`,`longitude < ${e}`,
          `(borough='BK' OR borough='QN')`,
          `(starts_with(bldgclass,'A') OR starts_with(bldgclass,'B'))`,
          `ownername IS NOT NULL`
        ].join(' AND ');
        const url=`${PLUTO}?$where=${encodeURIComponent(where)}&$limit=${perTileLimit}&$select=bbl,address,borough,bldgclass,ownername,yearbuilt,lotarea,assesstot,unitsres,zipcode,latitude,longitude`;
        let data=[];
        try{data=await fetchWithTimeout(url,timeoutMs)}catch(tileErr){
          skipped++;
          if(sub) sub.textContent=`One PLUTO batch skipped: ${tileErr.message}`;
          continue;
        }
        fetched+=Array.isArray(data)?data.length:0;
        for(let i=0;i<(data||[]).length;i++){
          if(loadCancelled || added>=maxAdd) break;
          const p=data[i];
          if(p.bbl&&existing.has(p.bbl)){skipped++;continue}
          let l=compactPlutoLead(plutoToLead(p));
          if(!l){skipped++;continue}
          state.leads.push(l);
          if(l.bbl) existing.add(l.bbl);
          added++;
        }
        tilesDone++;
        if(fill) fill.style.width=Math.min(99,Math.round((tilesDone/totalTiles)*100))+'%';
        if(sub) sub.textContent=`${added} added · ${skipped} skipped · ${tilesDone}/${totalTiles} batches`;
        await new Promise(r=>setTimeout(r,isMobile?180:80));
      }
    }
    if(fill) fill.style.width='100%';
    const saved=safeSaveAfterPluto();
    renderAll();
    if(added>=maxAdd && isMobile){
      info(`✓ Mobile-safe PLUTO loaded ${added} homeowner pins. Zoom closer to a block and load again for more.`);
      toast(`✓ Loaded ${added} pins — zoom in for more`);
    }else{
      info(`✓ ${name}: ${added} homeowner pins loaded safely.`);
      toast(`✓ Loaded ${added} homes`);
    }
  }catch(e){
    info('PLUTO load failed safely: '+(e.name==='AbortError'?'request timed out / area too large':e.message));
    toast('PLUTO load failed — zoom in and retry');
  }finally{
    prog?.classList.remove('open');
  }
}

function parseCSV(text){let rows=[],row=[],cur='',q=false;for(let i=0;i<text.length;i++){let c=text[i],n=text[i+1];if(c==='"'&&q&&n==='"'){cur+='"';i++;continue}if(c==='"'){q=!q;continue}if(c===','&&!q){row.push(cur);cur='';continue}if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(cur);if(row.some(x=>x.trim()))rows.push(row);row=[];cur='';continue}cur+=c}row.push(cur);if(row.some(x=>x.trim()))rows.push(row);return rows}

      first:l.first||'',last:l.last||'',phone:l.phone||'',email:l.email||'',addr:l.addr||l.address||'',city:l.city||'',boro:l.boro||'',zip:l.zip||'',
      lat:l.lat||null,lng:l.lng||null,status:l.status||'fresh',source:l.source||'manual',territory:l.territory||'',assigned_agent:l.assigned_agent||'',assigned_user_email:l.assigned_user_email||'',assigned_user_id:uuidOrNull(l.assigned_user_id),monthly_bill:l.monthly_bill||'',heating_bill:l.heating_bill||'',credit:l.credit||'',roof_notes:l.roof_notes||'',notes:l.notes||'',solar_status:l.solar_status||'',heating_type:l.heating_type||'',hvac_opportunity:l.hvac_opportunity||'',callback_due:l.callback_due||'',appt_time:l.appt_time||'',bbl:l.bbl||'',raw_data:raw,updated_at:l.updated_at||new Date().toISOString()
    }

  function fromCloud(row){

      phone:r.phone||row.phone||'',email:r.email||row.email||'',addr:r.addr||r.address||row.addr||'',city:r.city||row.city||'',boro:r.boro||row.boro||'',zip:r.zip||row.zip||'',
      lat:r.lat||row.lat,lng:r.lng||row.lng,status:r.status||row.status||'fresh',source:r.source||row.source||'cloud',territory:r.territory||row.territory||'',
      assigned_agent:r.assigned_agent||row.assigned_agent||'',assigned_user_email:r.assigned_user_email||row.assigned_user_email||'',
      monthly_bill:r.monthly_bill||row.monthly_bill||'',heating_bill:r.heating_bill||row.heating_bill||'',credit:r.credit||row.credit||'',roof_notes:r.roof_notes||row.roof_notes||'',

  function setCloudStatus(m,kind=''){const el=document.getElementById('m2CloudStatus'); if(el){el.textContent=m; el.className='sub '+kind;} localStorage.setItem('m2_last_cloud_status_v1',m)}
  async function testCloud(){try{client=null;const s=sb(); if(!s)return; setCloudStatus('Testing Supabase connection...'); const {data,error}=await s.from('leads').select('local_id').limit(1); if(error) throw error; await refreshUser(); setCloudStatus('✓ Supabase connected. '+(currentUser?('Logged in as '+currentUser.email):'Not logged in yet.'),'good'); say('✓ Supabase connected')}catch(e){setCloudStatus('Supabase test failed: '+e.message,'bad'); say('Supabase test failed: '+e.message)}}

  async function login(){try{const email=document.getElementById('sbEmail')?.value.trim(), pw=document.getElementById('sbPassword')?.value; if(!email||!pw)return say('Enter email and password'); const s=sb(); const {data,error}=await s.auth.signInWithPassword({email,password:pw}); if(error)throw error; currentUser=data.user; saveCfg({email}); setCloudStatus('✓ Logged into Supabase as '+email,'good'); say('✓ Logged into Supabase'); renderCloudPanel();}catch(e){setCloudStatus('Login failed: '+e.message,'bad'); say('Login failed: '+e.message)}}

    rows.forEach(r => { if(!isUuid(r.team_id)) r.team_id = tid; if(r.raw_data) r.raw_data.team_id = tid; });
    setCloudStatus('Syncing '+rows.length+' local leads up to Supabase with Team UUID '+tid+'...'); const del=await s.from('leads').delete().eq('team_id',tid); if(del.error)throw del.error; for(let i=0;i<rows.length;i+=500){const batch=rows.slice(i,i+500).map(r => ({...r, team_id: tid, assigned_user_id: uuidOrNull(r.assigned_user_id)})); const {error}=await s.from('leads').insert(batch); if(error)throw error; setCloudStatus('Synced '+Math.min(i+500,rows.length)+' of '+rows.length+' leads...')} saveSyncMeta({last_push:new Date().toISOString(),last_count:rows.length,team_id:tid}); setCloudStatus('✓ Synced '+rows.length+' leads to Supabase.','good'); say('✓ Leads synced to Supabase'); renderCloudPanel()}catch(e){setCloudStatus('Lead sync failed: '+e.message+' — usually a UUID column still received blank text. This build sends assigned_user_id as null unless it is a real UUID.','bad'); say('Lead sync failed: '+e.message+' — usually a UUID column still received blank text. This build sends assigned_user_id as null unless it is a real UUID.')}}
  async function adoptTeamFromCloud(s){

  async function pullLeads(){try{const s=sb(); if(!s)return; await refreshUser(); let tid=localTeamId(); setCloudStatus('Loading cloud leads from Team UUID '+tid+'...'); let res=await s.from('leads').select('*').eq('team_id',tid).limit(50000); if(res.error)throw res.error; let data=res.data||[];

  async function syncMaster(){try{const s=sb(); if(!s)return; let a=account(), sess=session(); const tid=await ensureCloudTeam(); const row={team_id:tid,name:a.master_name||sess.name||settings().agent_name||'Master',email:(a.master_email||cfg().email||document.getElementById('sbEmail')?.value||'').toLowerCase(),pin:a.master_pin||'',active:true,updated_at:new Date().toISOString()}; if(!row.email||!row.pin)return say('Save Master email/PIN in Account Access first, or enter email here.'); setCloudStatus('Syncing master login...'); await s.from('master_accounts').delete().eq('team_id',tid); const {error}=await s.from('master_accounts').insert([row]); if(error)throw error; setCloudStatus('✓ Master login synced to Supabase.','good'); say('✓ Master synced')}catch(e){setCloudStatus('Master sync failed: '+e.message,'bad'); say('Master sync failed: '+e.message)}}
  function sqlText(){return `-- M2 CRM Supabase Setup\ncreate table if not exists leads (\n  local_id text primary key,\n  team_id text, first text, last text, phone text, email text, addr text, city text, boro text, zip text,\n  lat double precision, lng double precision, status text, source text, territory text, assigned_agent text, assigned_user_email text, assigned_user_id text,\n  monthly_bill text, heating_bill text, credit text, roof_notes text, notes text, solar_status text, heating_type text, hvac_opportunity text,\n  callback_due text, appt_time text, bbl text, raw_data jsonb, updated_at timestamptz default now()\n);\ncreate table if not exists agent_accounts (id text primary key, team_id uuid references teams(id) on delete cascade, name text, email text, pin text, territory text, active boolean default true, created_at timestamptz default now(), updated_at timestamptz default now());\ncreate table if not exists master_accounts (id bigint generated by default as identity primary key, team_id uuid references teams(id) on delete cascade, name text, email text, pin text, active boolean default true, created_at timestamptz default now(), updated_at timestamptz default now());\nalter table teams enable row level security; alter table leads enable row level security; alter table agent_accounts enable row level security; alter table master_accounts enable row level security;\ndrop policy if exists "m2 teams open beta" on teams; create policy "m2 teams open beta" on teams for all using (true) with check (true);
drop policy if exists "m2 leads open beta" on leads; create policy "m2 leads open beta" on leads for all using (true) with check (true);\ndrop policy if exists "m2 agents open beta" on agent_accounts; create policy "m2 agents open beta" on agent_accounts for all using (true) with check (true);\ndrop policy if exists "m2 masters open beta" on master_accounts; create policy "m2 masters open beta" on master_accounts for all using (true) with check (true);`}
  function downloadSQL(){const blob=new Blob([sqlText()],{type:'text/sql'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='m2-supabase-setup.sql';a.click();setTimeout(()=>URL.revokeObjectURL(url),800);say('SQL setup downloaded')}
  function saveCloudCfg(){
    let team = document.getElementById('sbTeam')?.value.trim();

    document.getElementById('sbTeam') && (document.getElementById('sbTeam').value = team);

  }
  function cloudHTML(){let c=cfg(); return `<div class="card internal-hide" id="m2SupabasePanel"><h3>☁️ Supabase Cloud Sync</h3><p class="sub">This is the cloud sync section. Add your Supabase URL + anon key, log in, then push/pull leads. This keeps the map and original CRM features intact.</p><div class="form-row"><label>Supabase URL</label><input id="sbUrl" value="${esc(c.url||DEFAULT_URL)}" placeholder="https://xxxx.supabase.co"></div><div class="form-row"><label>Supabase anon / publishable key</label><input id="sbAnon" value="${esc(c.anon_key||DEFAULT_KEY)}" placeholder="sb_publishable... or eyJ..."></div><div class="form-grid-2"><div class="form-row"><label>Team UUID</label><input id="sbTeam" value="${esc(isUuid(c.team_id)?c.team_id:localTeamId())}" placeholder="auto-generated UUID"></div><div class="form-row"><label>Email</label><input id="sbEmail" value="${esc(c.email||'')}"></div></div><div class="form-row"><label>Password</label><input type="password" id="sbPassword" placeholder="Supabase password"></div><div class="action-grid"><button class="purple" data-cloud="saveCfg">Save Cloud Info</button><button class="blue" data-cloud="test">Test Connection</button><button class="green" data-cloud="login">Log In</button><button data-cloud="signup">Create Account</button><button class="gold" data-cloud="push">Sync Leads Up</button><button class="blue" data-cloud="pull">Load Cloud Leads</button><button class="purple" data-cloud="adopt">Find Existing Team</button><button data-cloud="agents">Sync Agents</button><button data-cloud="master">Sync Master</button><button data-cloud="logout">Log Out</button><button data-cloud="sql">Download SQL Setup</button></div><div class="sync-grid"><div class="sync-box"><div class="k">Last Sync Up</div><div class="v">${esc((syncMeta().last_push||'Never').replace('T',' ').slice(0,19))}</div></div><div class="sync-box"><div class="k">Last Load</div><div class="v">${esc((syncMeta().last_pull||'Never').replace('T',' ').slice(0,19))}</div></div><div class="sync-box"><div class="k">Cloud Leads</div><div class="v">${esc(syncMeta().last_count||0)}</div></div></div><p id="m2CloudStatus" class="sub">${esc(localStorage.getItem('m2_last_cloud_status_v1')||'Supabase panel ready. If sync fails, run the SQL setup in Supabase first.')}</p></div>`}
  window.renderCloudPanel=function(){
    const stats=document.getElementById('statsView'); if(!stats)return;
    let old=document.getElementById('m2SupabasePanel'); if(old)old.remove();
    const settingsCard=[...stats.querySelectorAll('.card')].find(x=>/Settings/i.test(x.textContent||''));
    if(settingsCard) settingsCard.insertAdjacentHTML('afterend',cloudHTML()); else stats.insertAdjacentHTML('afterbegin',cloudHTML());
    refreshUser().then(()=>{const el=document.getElementById('m2CloudStatus'); if(el&&currentUser)el.textContent='Logged into Supabase as '+currentUser.email;}).catch(()=>{});
  };
  const oldRender=window.renderStats||renderStats;
  try{window.renderStats=function(){oldRender.apply(this,arguments);setTimeout(renderCloudPanel,30)}; renderStats=window.renderStats;}catch(e){}
  document.addEventListener('click',function(e){const b=e.target.closest('[data-cloud]'); if(!b)return; e.preventDefault(); e.stopPropagation(); const a=b.dataset.cloud; if(a==='saveCfg')saveCloudCfg(); else if(a==='test')testCloud(); else if(a==='signup')signUp(); else if(a==='login')login(); else if(a==='logout')logout(); else if(a==='push')pushLeads(); else if(a==='pull')pullLeads(); else if(a==='adopt'){const s=sb(); if(s) adoptTeamFromCloud(s).then(tid=>{if(tid){setCloudStatus('✓ Found existing Team UUID '+tid+'. Now click Load Cloud Leads.','good');say('✓ Existing team found')}else{setCloudStatus('No existing cloud team found. Sync leads up from original browser first.','bad');say('No existing team found')}}).catch(e=>{setCloudStatus('Find team failed: '+e.message,'bad');say('Find team failed: '+e.message)})} else if(a==='agents')syncAgents(); else if(a==='master')syncMaster(); else if(a==='sql')downloadSQL();},true);
  window.addEventListener('load',()=>setTimeout(renderCloudPanel,900));
})();

<script>
(function(){
  function safeEsc(x){try{return esc(x)}catch(e){return String(x??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}}
  function statusName(k){try{return (LABEL&&LABEL[k])||k||'fresh'}catch(e){return k||'fresh'}}
  function todayString(){return new Date().toLocaleDateString([], {weekday:'short', month:'short', day:'numeric', year:'numeric'})}
  function leadStreet(l){try{return normStreet(l.addr||l.address||'')}catch(e){return (l.addr||'').replace(/^\d+\s*/, '').toLowerCase().trim()}}
  function isDoorStatus(s){return ['knocked','not_home','interested','callback','set','sat','closed','not_interested','not_qualified','do_not_knock'].includes(s)}
  function eodStats(){
    const sess=(typeof session==='function'?session():{})||{};
    const scoped=(typeof scopedLeads==='function'?scopedLeads():(state.leads||[]));
    const today=new Date().toDateString();
    let logs=[];
    (state.leads||[]).forEach(l=>(l.activity_log||[]).forEach(log=>{if(log.at&&new Date(log.at).toDateString()===today)logs.push({lead:l,...log})}));
    if((sess.role||'master')==='agent'){
      const em=String(sess.email||'').toLowerCase(), nm=String(sess.name||'').toLowerCase();
      logs=logs.filter(x=>String(x.agent||x.lead?.assigned_agent||'').toLowerCase()===nm || String(x.lead?.assigned_user_email||'').toLowerCase()===em);
    }
    const workedLeads=new Set(logs.filter(x=>isDoorStatus(x.type)).map(x=>x.lead&&x.lead.id).filter(Boolean));
    const counts={doors:workedLeads.size, knocked:0, not_home:0, interested:0, callbacks:0, set:0, sat:0, closed:0, dnk:0, not_interested:0};
    logs.forEach(x=>{if(x.type==='knocked')counts.knocked++; if(x.type==='not_home')counts.not_home++; if(x.type==='interested')counts.interested++; if(x.type==='callback')counts.callbacks++; if(x.type==='set')counts.set++; if(x.type==='sat')counts.sat++; if(x.type==='closed')counts.closed++; if(x.type==='do_not_knock')counts.dnk++; if(x.type==='not_interested')counts.not_interested++;});
    const streets={};
    Array.from(workedLeads).forEach(id=>{const l=(state.leads||[]).find(x=>x.id===id); const st=l?leadStreet(l):''; if(st)streets[st]=(streets[st]||0)+1;});
    const followTomorrow=scoped.filter(l=>{let d=new Date(l.callback_due||l.appt_time||''); if(isNaN(d))return false; let t=new Date(); t.setDate(t.getDate()+1); return d.toDateString()===t.toDateString();}).length;
    const dueToday=scoped.filter(l=>{try{return isDue(l)}catch(e){return false}}).length;
    const bestStreet=Object.entries(streets).sort((a,b)=>b[1]-a[1])[0];
    return {logs, counts, streets, bestStreet, followTomorrow, dueToday, scoped};
  }
  function buildEodReport(){
    const st=eodStats(), c=st.counts, sess=(typeof session==='function'?session():{})||{}, rep=(sess.role==='agent'?sess.name:'Team / Master');
    const streetLines=Object.entries(st.streets).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([k,v])=>`- ${k.replace(/\b\w/g,m=>m.toUpperCase())}: ${v} door(s)`).join('\n') || '- No streets worked today';
    return `M2 CRM End of Day Report\n${todayString()}\nRep/Team: ${rep||'Team'}\n\nProduction\n- Total doors worked: ${c.doors}\n- Knocked: ${c.knocked}\n- Not home: ${c.not_home}\n- Not interested: ${c.not_interested}\n- Interested: ${c.interested}\n- Callbacks: ${c.callbacks}\n- Appointments set: ${c.set}\n- Sat: ${c.sat}\n- Closed: ${c.closed}\n- Do not knock: ${c.dnk}\n\nFollow-Up\n- Follow-ups due today/overdue: ${st.dueToday}\n- Follow-ups due tomorrow: ${st.followTomorrow}\n\nBest Street / Block\n- ${st.bestStreet ? st.bestStreet[0].replace(/\b\w/g,m=>m.toUpperCase())+' ('+st.bestStreet[1]+' doors)' : 'No block activity yet'}\n\nStreets Worked\n${streetLines}\n\nManager Notes\n- Review hot leads untouched, overdue callbacks, and streets marked Needs Return.\n- Sync Leads Up before ending the day.`;
  }
  function coachingAlerts(){
    const rows=(typeof repPerformance==='function'?repPerformance():[]);
    const leads=(typeof scopedLeads==='function'?scopedLeads():(state.leads||[]));
    let alerts=[];
    const due=leads.filter(l=>{try{return isDue(l)}catch(e){return false}}).length;
    if(due>0)alerts.push({level:'warn',title:`${due} follow-up(s) due or overdue`,body:'Call these before adding new doors. Hot callbacks should not sit overnight.'});
    rows.forEach(r=>{
      if(r.assigned>0 && r.doors<10)alerts.push({level:'warn',title:`${r.name}: low activity today`,body:`${r.doors} doors logged. Goal should be closer to ${((typeof settings==='function'?settings():{}).door_goal)||25}.`});
      if(r.doors>=20 && r.set===0)alerts.push({level:'danger',title:`${r.name}: no appointments after ${r.doors} doors`,body:'Coach opener, urgency, rebate explanation, and same-day/next-day close.'});
      if(r.hot>0 && r.due>0)alerts.push({level:'danger',title:`${r.name}: hot leads need attention`,body:`${r.hot} hot lead(s), ${r.due} due/overdue follow-up(s).`});
      if(r.closed>0 || r.set>=2)alerts.push({level:'good',title:`${r.name}: strong production`,body:`${r.set} appointment(s), ${r.closed} closed. Review what worked and repeat that block/profile.`});
    });
    if(!alerts.length)alerts.push({level:'good',title:'No major coaching flags yet',body:'Keep reps focused on block mode, follow-ups, and high-quality homes.'});
    return alerts.slice(0,8);
  }
  function territoryHeat(){
    let groups=[];
    try{groups=streetGroups()}catch(e){groups=[]}
    return groups.map(g=>{
      const leads=g.leads||[];
      const interested=leads.filter(l=>['interested','callback','set','sat','closed'].includes(l.status)).length;
      const closed=leads.filter(l=>l.status==='closed').length;
      const notInt=leads.filter(l=>['not_interested','not_qualified','do_not_knock'].includes(l.status)).length;
      const heat=(g.hot*12)+(interested*10)+(g.appts*14)+(closed*25)-Math.min(notInt*4,35)+Math.round((g.pct||0)/4);
      return {...g, interested, closed, notInt, heat:Math.max(0,Math.min(100,heat))};
    }).sort((a,b)=>b.heat-a.heat || b.hot-a.hot || b.open-a.open).slice(0,20);
  }
  function fieldProductivityHTML(){
    const alerts=coachingAlerts();

/* M2 MOBILE STABILITY FIX — disables heavy PLUTO on phones and caps rendered markers */
(function(){
  const isPhone = () => /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) || Math.min(screen.width||9999, window.innerWidth||9999) <= 820;
  const MOBILE_MARKER_LIMIT = 450;
  const MOBILE_PLUTO_KEEP_LIMIT = 120;
  const lightLead = (l) => {
    const keep = ['id','source','status','first','last','addr','address','boro','zip','phone','email','lat','lng','assigned_agent','assigned_user_email','assigned_user_id','territory','solar_status','heating_type','hvac_opportunity','monthly_bill','callback_due','appt_time','notes','updated_at','activity_log','sun_score','bbl','entity','needs_verify','raw_owner','bldg_class','units','year_built','lot_sqft','est_value'];
    const o={}; keep.forEach(k=>{ if(l && l[k]!==undefined && l[k]!==null && l[k]!== '') o[k]=l[k]; });
    if(Array.isArray(o.activity_log)) o.activity_log=o.activity_log.slice(-8);
    if(typeof o.notes==='string' && o.notes.length>600) o.notes=o.notes.slice(0,600)+'…';
    return o;
  };
  window.m2MobileStabilityCleanup = function(){
    if(!isPhone() || !window.state || !Array.isArray(state.leads)) return false;
    let changed=false;
    const imported = [], pluto = [];
    state.leads.forEach(l => (l.source==='pluto' ? pluto : imported).push(lightLead(l)));
    if(pluto.length > MOBILE_PLUTO_KEEP_LIMIT){
      const worked = pluto.filter(l => !['fresh',''].includes(l.status||''));
      const fresh = pluto.filter(l => ['fresh',''].includes(l.status||''));
      state.leads = imported.concat(worked.slice(0, MOBILE_PLUTO_KEEP_LIMIT), fresh.slice(0, Math.max(0, MOBILE_PLUTO_KEEP_LIMIT-worked.length)));
      changed=true;
      try{ localStorage.setItem('m2_mobile_pluto_trim_notice','1'); }catch(e){}
    }else{
      state.leads = imported.concat(pluto);
      changed=true;
    }
    try{ if(typeof saveState==='function') saveState(); }catch(e){
      try{ localStorage.setItem('nyc_solar_crm_v3', JSON.stringify(state)); }catch(_){}
    }
    return changed;
  };

  const oldLoadPluto = window.loadPlutoBounds || (typeof loadPlutoBounds==='function' ? loadPlutoBounds : null);
  window.loadPlutoBounds = async function(bounds, name='this area'){
    if(isPhone()){
      try{ m2MobileStabilityCleanup(); }catch(e){}
      try{ info('📱 Mobile Safe Mode: PLUTO loading is desktop-only now. Use imported/cloud leads on phone. Load PLUTO on desktop, then sync selected leads.'); }catch(e){}
      try{ toast('PLUTO disabled on phone to stop crashes'); }catch(e){}
      if(typeof modal==='function'){
        modal('📱 Mobile Safe Mode', `<p class="sub">Your phone is crashing because NYC PLUTO owner data creates too many map points for mobile Safari.</p><div class="card"><h3>Use this workflow</h3><p class="sub">1. Use phone for imported/cloud leads, dispositions, Block Mode, and follow-ups.<br>2. Use desktop/laptop for PLUTO Load Area.<br>3. Sync the selected leads up to Supabase.<br>4. Load Cloud Leads on phone.</p></div><div class="action-grid"><button class="green" data-action="fitLeads">Fit Saved Leads</button><button data-action="closeModal">Close</button></div>`);
      }
      return {added:0, skipped:true, mobile:true};
    }
    return oldLoadPluto ? oldLoadPluto(bounds,name) : null;
  };
  try{ loadPlutoBounds = window.loadPlutoBounds; }catch(e){}

  window.renderMarkers = function(){
    try{
      Object.values(markers||{}).forEach(m=>map.removeLayer(m));
      markers={};
      let arr=(typeof filterLeads==='function'?filterLeads():((state&&state.leads)||[])).filter(l=>l && l.lat && l.lng);
      if(isPhone()){
        const b = map && map.getBounds ? map.getBounds().pad(0.20) : null;
        if(b) arr = arr.filter(l=>b.contains([+l.lat,+l.lng]));
        arr = arr.sort((a,b)=>leadQuality(b)-leadQuality(a)).slice(0,MOBILE_MARKER_LIMIT);
        try{ info(`📱 Mobile Safe Map: showing ${arr.length} nearby pins. PLUTO disabled on phone.`); }catch(e){}
      }else{
        arr = arr.slice(0,6000);
      }
      arr.forEach(l=>{
        let m=L.marker([+l.lat,+l.lng],{icon:leadIcon(l), interactive:true, keyboard:false}).addTo(map);
        m.on('click',()=>openLead(l.id));
        m.bindPopup(`<b>${esc(nameOf(l))}</b><br>${esc(l.addr||'')}<br>☀ ${sunScore(l)} · Q${leadQuality(l)} · ${LABEL[l.status||'fresh']}`);
        markers[l.id]=m;
      });
    }catch(e){
      try{ info('Map marker render skipped safely: '+e.message); }catch(_){}
    }
  };
  try{ renderMarkers = window.renderMarkers; }catch(e){}

  function mobileMapRefresh(){
    if(!isPhone()) return;
    try{ if(window._m2MobileRefresh) clearTimeout(window._m2MobileRefresh); }catch(e){}
    window._m2MobileRefresh=setTimeout(()=>{try{renderMarkers(); map.invalidateSize(false);}catch(e){}},220);
  }
  try{ map.off('zoomend', mobileMapRefresh); map.off('moveend', mobileMapRefresh); map.on('zoomend', mobileMapRefresh); map.on('moveend', mobileMapRefresh); }catch(e){}
  window.addEventListener('load',()=>setTimeout(()=>{try{ if(m2MobileStabilityCleanup()) renderAll(); }catch(e){} if(isPhone()) try{info('📱 Mobile Safe Mode on: PLUTO desktop-only, markers capped for smoother zooming.')}catch(_){}} ,900));
})();

  `;
  try{document.head.appendChild(ownerStyle)}catch(e){}

  function lightOwnerLead(l){
    if(!l) return null;
    const keep=['id','source','status','first','last','addr','address','boro','zip','phone','email','lat','lng','assigned_agent','assigned_user_email','territory','solar_status','heating_type','hvac_opportunity','monthly_bill','callback_due','appt_time','notes','updated_at','activity_log','sun_score','bbl','entity','needs_verify','raw_owner','bldg_class','units','year_built','lot_sqft','est_value'];

  }
  function markerStatusClass(l){

    if(['do_not_knock','not_qualified','not_interested'].includes(st)) return 'dnk';
    if(['knocked','not_home','callback','interested','set','sat','closed'].includes(st)) return 'worked';
    try{return leadQuality(l)>=70?'hot':''}catch(e){return ''}

  function ownerDivIcon(l){
    const zoom = map && map.getZoom ? map.getZoom() : 17;

  function phoneCleanupOwners(){

    state.leads=state.leads.map(l=>l && l.source==='pluto'?lightOwnerLead(l):l).filter(Boolean);

      const nonPluto=[], pluto=[];
      state.leads.forEach(l=>(l.source==='pluto'?pluto:nonPluto).push(l));
      if(pluto.length>PHONE_OWNER_KEEP_LIMIT){
        const worked=pluto.filter(l=>!['fresh',''].includes(l.status||''));

  async function fetchJsonTimeout(url,ms){
    const c=new AbortController(); const t=setTimeout(()=>c.abort(),ms);
    try{const r=await fetch(url,{signal:c.signal}); if(!r.ok) throw new Error('NYC PLUTO '+r.status); return await r.json();}
    finally{clearTimeout(t)}
  }
  function boundsTooWide(bounds,maxSpan){
    const south=+bounds[0], west=+bounds[1], north=+bounds[2], east=+bounds[3];
    return Math.abs(north-south)>maxSpan || Math.abs(east-west)>maxSpan;
  }
  async function smartPlutoLoad(bounds,name='visible block'){
    const phone=isPhone();
    const z=map && map.getZoom ? map.getZoom() : 16;
    const prog=document.getElementById('progress'), fill=document.getElementById('progFill'), sub=document.getElementById('progSub'), titleEl=document.getElementById('progTitle');

    const maxAdd=phone?180:1800, tileCount=phone?2:3, perTile=phone?60:300, timeoutMs=phone?9000:16000;
    const south=+bounds[0], west=+bounds[1], north=+bounds[2], east=+bounds[3];
    const latStep=(north-south)/tileCount, lngStep=(east-west)/tileCount;
    const existing=new Set((state.leads||[]).map(l=>String(l.bbl||'')).filter(Boolean));
    let added=0, skipped=0, batches=0, total=tileCount*tileCount;
    try{
      for(let yi=0; yi<tileCount; yi++){
        for(let xi=0; xi<tileCount; xi++){
          if(added>=maxAdd) break;
          const s=south+(latStep*yi), n=south+(latStep*(yi+1)), w=west+(lngStep*xi), e=west+(lngStep*(xi+1));
          const where=[`latitude > ${s}`,`latitude < ${n}`,`longitude > ${w}`,`longitude < ${e}`,`(borough='BK' OR borough='QN')`,`(starts_with(bldgclass,'A') OR starts_with(bldgclass,'B'))`,`ownername IS NOT NULL`].join(' AND ');
          const url=`${PLUTO}?$where=${encodeURIComponent(where)}&$limit=${perTile}&$select=bbl,address,borough,bldgclass,ownername,yearbuilt,lotarea,assesstot,unitsres,zipcode,latitude,longitude`;
          let data=[];
          try{data=await fetchJsonTimeout(url,timeoutMs)}catch(err){skipped++; if(sub) sub.textContent='Skipped one batch: '+err.message; continue;}
          for(const p of data||[]){
            if(added>=maxAdd) break;
            if(p.bbl && existing.has(String(p.bbl))){skipped++; continue;}
            let l=null; try{l=lightOwnerLead(plutoToLead(p));}catch(e){}

          await new Promise(r=>setTimeout(r,phone?120:45));
        }
      }

      try{saveState();}catch(e){

      return {added, skipped};

      try{info('Owner-name load failed safely: '+e.message)}catch(_){}

  };

    map.on('movestart zoomstart',()=>{try{map.closePopup()}catch(e){}});
  }catch(e){}
  window.m2ShowOwnerLoader=function(){try{localStorage.removeItem('m2_owner_card_hidden_v1'); const c=document.getElementById('m2OwnerLoadCard'); if(c){c.classList.add('open','min');}}catch(e){}};

  window.addEventListener('load',()=>setTimeout(()=>{injectOwnerCard(); phoneCleanupOwners(); try{renderAll();}catch(e){} try{info('🏠 Smooth owner-name mode ready. Use the small Owners pill or Field Tools to load a block.')}catch(e){}},1000));
})();
</script>


<script>
/* M2 OWNER NAME COMPACT HOUSE-BY-HOUSE PATCH
   Smaller owner labels + clearer house-by-house separation. Full info opens only on tap. */
(function(){
  const isPhone=()=>/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)||Math.min(screen.width||9999,window.innerWidth||9999)<=820;
  const css=document.createElement('style');
  css.textContent=`
    .owner-home-pin{display:none!important;}
    .m2-house-pin{position:relative;transform:translate(-50%,-50%);display:flex;align-items:center;gap:3px;pointer-events:auto;will-change:transform;}
    .m2-house-pin .dot{width:18px;height:18px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle,#fff7a6,#ffb703 58%,#fb8500);box-shadow:0 0 0 1.5px rgba(0,0,0,.45),0 0 10px rgba(255,183,3,.45);font-size:10px;flex:0 0 auto;}
    .m2-house-pin .mini{display:flex;align-items:center;gap:2px;max-width:86px;background:rgba(255,255,255,.93);color:#06111f;border:1px solid rgba(255,183,3,.72);border-radius:999px;padding:2px 4px 2px 2px;box-shadow:0 5px 14px rgba(0,0,0,.22);overflow:hidden;}
    .m2-house-pin .num{font:900 8px/1 system-ui,-apple-system,Segoe UI,sans-serif;background:#07111d;color:#f9c74f;border-radius:999px;padding:2px 4px;max-width:28px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .m2-house-pin .nm{font:900 8.5px/1 system-ui,-apple-system,Segoe UI,sans-serif;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:48px;}
    .m2-house-pin.hot .mini{border-color:#2affc2}.m2-house-pin.worked{opacity:.63}.m2-house-pin.dnk{opacity:.38;filter:grayscale(.7)}
    .m2-house-pin.left .mini{order:-1}.m2-house-pin.left{transform:translate(-78%,-50%)}.m2-house-pin.right{transform:translate(-22%,-50%)}
    .m2-house-pin.no-label .mini{display:none}.m2-house-pin.no-label .dot{width:22px;height:22px;font-size:12px;}
    .m2-house-pin.selected{z-index:9999!important;transform:translate(-50%,-50%) scale(1.22)!important;}
    .m2-house-pin.selected .dot{width:28px;height:28px;font-size:15px;background:radial-gradient(circle,#ffffff,#38bdf8 55%,#1d4ed8);box-shadow:0 0 0 3px #fff,0 0 0 7px rgba(56,189,248,.45),0 0 28px rgba(56,189,248,.95);animation:m2SelectedPulse 1.05s ease-in-out infinite alternate;}
    .m2-house-pin.selected .mini{background:#07111d;color:#fff;border:2px solid #38bdf8;box-shadow:0 0 0 3px rgba(56,189,248,.25),0 10px 24px rgba(0,0,0,.35);max-width:112px;}
    .m2-house-pin.selected .num{background:#38bdf8;color:#00111f}.m2-house-pin.selected .nm{max-width:64px;}
    .m2-house-pin.selected:after{content:'SELECTED';position:absolute;left:50%;top:-20px;transform:translateX(-50%);font:1000 8px/1 system-ui,-apple-system,Segoe UI,sans-serif;letter-spacing:.4px;color:#00111f;background:#38bdf8;border:1px solid #fff;border-radius:999px;padding:3px 6px;box-shadow:0 8px 16px rgba(0,0,0,.28);}
    @keyframes m2SelectedPulse{from{filter:saturate(1)}to{filter:saturate(1.5) brightness(1.15)}}
    .m2-selected-strip{position:absolute;left:12px;right:12px;bottom:76px;z-index:540;background:rgba(3,12,26,.92);backdrop-filter:blur(14px);border:1px solid rgba(56,189,248,.45);border-radius:16px;padding:9px 10px;box-shadow:0 14px 36px rgba(0,0,0,.35);display:none;align-items:center;gap:8px;}
    .m2-selected-strip.open{display:flex}.m2-selected-strip .sel-dot{width:27px;height:27px;border-radius:50%;display:grid;place-items:center;background:#38bdf8;color:#00111f;font-weight:1000;box-shadow:0 0 0 3px rgba(56,189,248,.25)}
    .m2-selected-strip .sel-main{min-width:0;flex:1}.m2-selected-strip .sel-main b{display:block;color:#fff;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.m2-selected-strip .sel-main span{display:block;color:#9aa4b2;font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.m2-selected-strip button{border:0;border-radius:10px;padding:7px 9px;font-size:11px;font-weight:1000;background:#238636;color:white}.m2-selected-strip button.gray{background:#21262d;color:#fff;border:1px solid rgba(255,255,255,.12)}
    .leaflet-popup-content{font-size:12px;line-height:1.35;margin:10px 11px!important;}.leaflet-popup-content b{font-size:13px}.leaflet-popup-content .m2-pop-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}.leaflet-popup-content .m2-pop-actions button{border:0;border-radius:9px;padding:7px 8px;font-weight:900;font-size:11px;background:#1f6feb;color:white}.leaflet-popup-content .m2-pop-actions button:last-child{background:#238636}
  `;
  document.head.appendChild(css);

  function esc2(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
  function ownerName(l){try{if(typeof nameOf==='function'){let n=nameOf(l); if(n) return n;} }catch(e){} return (`${l.first||''} ${l.last||''}`.trim() || l.raw_owner || l.owner || 'Homeowner');}
  function lastShort(l){let n=ownerName(l).replace(/\b(LLC|INC|CORP|TRUST|ESTATE|THE)\b/ig,'').trim(); let parts=n.split(/\s+/).filter(Boolean); return (parts.length>1?parts[parts.length-1]:parts[0]||'Owner').slice(0,12);}
  function houseNum(l){let a=l.addr||l.address||''; let m=String(a).match(/^\s*([0-9]{1,6}[A-Z]?)/i); return m?m[1]:'';}
  function houseParity(l){let h=parseInt(houseNum(l),10); if(!h) return ''; return h%2?'left':'right';}
  function statusClass(l){let st=(l.status||'fresh'); if(['do_not_knock','not_qualified','not_interested'].includes(st))return'dnk'; if(['knocked','not_home','callback','interested','set','sat','closed'].includes(st))return'worked'; try{return leadQuality(l)>=70?'hot':''}catch(e){return''}}
  function selectedId(){return window._m2SelectedLeadId || currentLeadId || '';}
  function compactIcon(l){let z=map&&map.getZoom?map.getZoom():17; let show=z>=18; let num=houseNum(l); let name=lastShort(l); let side=houseParity(l); let selected=(selectedId()===l.id); let html=`<div class="m2-house-pin ${statusClass(l)} ${side} ${show?'':'no-label'} ${selected?'selected':''}"><span class="dot">${selected?'✓':'☀️'}</span><span class="mini"><span class="num">${esc2(num||'')}</span><span class="nm">${esc2(name)}</span></span></div>`; return L.divIcon({className:'',html,iconSize:[show?112:34,selected?34:24],iconAnchor:[12,12],popupAnchor:[0,-14]});}
  function popupHtml(l){let q=0, ss=0; try{q=leadQuality(l)}catch(e){} try{ss=sunScore(l)}catch(e){} return `<b>✅ SELECTED: ${esc2(ownerName(l))}</b><br><span>${esc2(l.addr||l.address||'')}</span><br>${l.phone?`📞 ${esc2(l.phone)}<br>`:''}${l.email?`✉️ ${esc2(l.email)}<br>`:''}<span>Score ${ss} · Quality ${q} · ${esc2((LABEL&&LABEL[l.status||'fresh'])||l.status||'Fresh')}</span><div class="m2-pop-actions"><button onclick="try{map.closePopup()}catch(e){}">Close</button><button onclick="try{openLead('${esc2(l.id)}')}catch(e){}">Open Lead</button></div>`;}
  function ensureSelectedStrip(){
    let s=document.getElementById('m2SelectedStrip'); if(s) return s;
    s=document.createElement('div'); s.id='m2SelectedStrip'; s.className='m2-selected-strip';
    s.innerHTML=`<div class="sel-dot">✓</div><div class="sel-main"><b id="m2SelName">Selected house</b><span id="m2SelAddr"></span></div><button id="m2SelOpen">Open</button><button class="gray" id="m2SelClear">Clear</button>`;
    (document.querySelector('.map-wrap')||document.body).appendChild(s);
    s.querySelector('#m2SelOpen').onclick=()=>{let id=selectedId(); if(id) try{openLead(id)}catch(e){}};
    s.querySelector('#m2SelClear').onclick=()=>{window._m2SelectedLeadId=''; currentLeadId=null; s.classList.remove('open'); try{map.closePopup()}catch(e){} try{window.renderMarkers()}catch(e){}};
    return s;
  }
  function showSelectedStrip(l){
    let s=ensureSelectedStrip();
    let n=s.querySelector('#m2SelName'), a=s.querySelector('#m2SelAddr');
    if(n) n.textContent='Selected: '+ownerName(l);
    if(a) a.textContent=(l.addr||l.address||'') + (l.phone?(' · '+l.phone):'');
    s.classList.add('open');
  }
  function markSelected(l,m){
    window._m2SelectedLeadId=l.id; currentLeadId=l.id;
    try{Object.entries(markers||{}).forEach(([id,mm])=>{let lead=(state.leads||[]).find(x=>x.id===id); if(lead&&mm&&mm.setIcon) mm.setIcon((lead.source==='pluto'||isPhone())?compactIcon(lead):(typeof leadIcon==='function'?leadIcon(lead):compactIcon(lead)));});}catch(e){}
    try{if(m&&m.setIcon)m.setIcon(compactIcon(l));}catch(e){}
    try{if(map&&map.panTo) map.panTo([+l.lat,+l.lng],{animate:true,duration:.25});}catch(e){}
    showSelectedStrip(l);
  }

  window.renderMarkers=function(){
    try{
      Object.values(markers||{}).forEach(m=>map.removeLayer(m)); markers={};
      let arr=(typeof filterLeads==='function'?filterLeads():((state&&state.leads)||[])).filter(l=>l&&l.lat&&l.lng);
      const phone=isPhone();
      if(phone){
        const b=map&&map.getBounds?map.getBounds().pad(0.10):null;
        if(b) arr=arr.filter(l=>b.contains([+l.lat,+l.lng]));
        arr=arr.sort((a,b)=>{try{return leadQuality(b)-leadQuality(a)}catch(e){return 0}}).slice(0,150);
      }else{
        arr=arr.slice(0,4500);
      }
      arr.forEach(l=>{
        const icon=(l.source==='pluto'||phone)?compactIcon(l):(typeof leadIcon==='function'?leadIcon(l):compactIcon(l));
        const m=L.marker([+l.lat,+l.lng],{icon,interactive:true,keyboard:false,riseOnHover:true}).addTo(map);
        m.on('click',()=>{try{map.closePopup()}catch(e){} markSelected(l,m); m.bindPopup(popupHtml(l),{autoPan:true,closeButton:true,maxWidth:230}).openPopup();});
        markers[l.id]=m;
      });
      if(phone){try{info('🏠 Compact house labels on. Zoom in to see house # + owner last name; tap a house for full owner info.')}catch(e){}}
    }catch(e){try{info('Compact marker render protected: '+e.message)}catch(_){}}
  };

  const _m2OriginalOpenLead = window.openLead;
  if(typeof _m2OriginalOpenLead === 'function'){
    window.openLead=function(id){
      try{
        window._m2SelectedLeadId=id; currentLeadId=id;
        let l=(state.leads||[]).find(x=>x.id===id);
        if(l){ showSelectedStrip(l); if(markers&&markers[id]&&markers[id].setIcon) markers[id].setIcon((l.source==='pluto'||isPhone())?compactIcon(l):(typeof leadIcon==='function'?leadIcon(l):compactIcon(l))); }
      }catch(e){}
      return _m2OriginalOpenLead.apply(this,arguments);
    };
  }

  try{renderMarkers=window.renderMarkers}catch(e){}
  try{map.on('zoomend moveend',()=>{clearTimeout(window._m2CompactRender); window._m2CompactRender=setTimeout(()=>{try{window.renderMarkers()}catch(e){}},280);});}catch(e){}
  window.addEventListener('load',()=>setTimeout(()=>{try{window.renderMarkers()}catch(e){}},900));
})();
</script>

</body>
