function parseOwner(raw,includeLLC=true,allowVerify=true){if(!raw)return null;let up=raw.toUpperCase().trim();let ent=['LLC','CORP','INC','TRUST','ESTATE','REALTY','PROPERTIES','HOLDINGS','MANAGEMENT','ASSOCIATES','BANK','CITY OF','NYC'].some(t=>up.includes(t));if(ent)return includeLLC?{first:'',last:title(raw).slice(0,44),entity:true,raw}:null;let primary=up.split('&')[0].trim().replace(/\b(JR|SR|II|III|IV)\.?$/,'').trim();let p=primary.split(/\s+/).filter(Boolean);if(p.length<2&&!allowVerify)return null;if(p.length<2)return{first:'',last:title(p[0]||raw),needs_verify:true,raw};return{first:title(p[1]),last:title(p[0]),raw}}

function plutoToLead(p){let set=settings(), parsed=parseOwner(p.ownername,set.include_llc!==false,set.allow_verify!==false);if(!parsed||!p.latitude||!p.longitude)return null;return{id:'p_'+(p.bbl||Date.now()+Math.random()),source:'pluto',status:'fresh',bbl:p.bbl,first:parsed.first,last:parsed.last,entity:parsed.entity,needs_verify:parsed.needs_verify,raw_owner:p.ownername,addr:title(p.address||''),boro:p.borough==='QN'?'Queens':p.borough==='BK'?'Brooklyn':p.borough,zip:p.zipcode||'',lat:+p.latitude,lng:+p.longitude,bldg_class:p.bldgclass||'',units:+p.unitsres||1,year_built:+p.yearbuilt||'',lot_sqft:+p.lotarea||'',est_value:+p.assesstot||'',assigned_agent:'',territory:p.borough==='QN'?'Queens':'Brooklyn',solar_status:'unknown',heating_type:'unknown',monthly_bill:'',notes:'',updated_at:null}}
async function loadPlutoBounds(bounds,name='this area'){loadCancelled=false;let prog=document.getElementById('progress'), fill=document.getElementById('progFill'), sub=document.getElementById('progSub');prog.classList.add('open');document.getElementById('progTitle').textContent=`Loading ${name} owner names…`;fill.style.width='0%';let existing=new Set(state.leads.map(l=>l.bbl).filter(Boolean)), added=0, skipped=0;try{let where=[`latitude > ${bounds[0]}`,`latitude < ${bounds[2]}`,`longitude > ${bounds[1]}`,`longitude < ${bounds[3]}`,`(borough='BK' OR borough='QN')`,`(starts_with(bldgclass,'A') OR starts_with(bldgclass,'B'))`,`ownername IS NOT NULL`].join(' AND ');let url=`${PLUTO}?$where=${encodeURIComponent(where)}&$limit=50000&$select=bbl,address,borough,bldgclass,ownername,yearbuilt,lotarea,assesstot,unitsres,zipcode,latitude,longitude`;sub.textContent='Fetching NYC PLUTO records…';let data=await fetch(url).then(r=>r.json());for(let i=0;i<data.length;i++){if(loadCancelled)break;let p=data[i];if(p.bbl&&existing.has(p.bbl)){skipped++;continue}let l=plutoToLead(p);if(!l){skipped++;continue}state.leads.push(l);if(l.bbl)existing.add(l.bbl);added++;if(i%250===0){fill.style.width=Math.round(i/data.length*100)+'%';sub.textContent=`${added} added · ${skipped} skipped`}}saveState();renderAll();info(`✓ ${name}: ${added} homeowner pins loaded. Sun icons restored.`);toast(`✓ Loaded ${added} homes`)}catch(e){info('PLUTO load failed: '+e.message);toast('PLUTO load failed')}finally{prog.classList.remove('open')}}

function importCSV(file){if(!file)return;let r=new FileReader();r.onload=()=>{let rows=parseCSV(r.result);if(rows.length<2){toast('CSV empty');return}let h=rows[0].map(x=>x.trim().toLowerCase()), data=rows.slice(1);if(!confirm(`Import ${data.length} CSV rows?`))return;data.forEach((row,i)=>{let obj={};h.forEach((k,j)=>obj[k]=row[j]||'');let full=obj.name||obj.owner||obj.full_name||'', parts=full.split(/\s+/);let lead={id:'csv_'+Date.now()+'_'+i,source:'imported',status:'fresh',first:obj.first||obj.firstname||parts[0]||'',last:obj.last||obj.lastname||parts.slice(1).join(' ')||'Imported Lead',addr:obj.address||obj.addr||obj.street||'',boro:obj.boro||obj.city||obj.borough||'',zip:obj.zip||'',phone:obj.phone||'',email:obj.email||'',monthly_bill:obj.bill||obj.monthly_bill||'',lat:+(obj.lat||obj.latitude)||map.getCenter().lat+(Math.random()-.5)*.02,lng:+(obj.lng||obj.lon||obj.longitude)||map.getCenter().lng+(Math.random()-.5)*.02,assigned_agent:obj.agent||'',territory:obj.territory||settings().territory,updated_at:new Date().toISOString()};state.leads.push(lead)});saveState();renderAll();toast('✓ CSV imported')};r.readAsText(file)}
function parseCSV(text){let rows=[],row=[],cur='',q=false;for(let i=0;i<text.length;i++){let c=text[i],n=text[i+1];if(c==='"'&&q&&n==='"'){cur+='"';i++;continue}if(c==='"'){q=!q;continue}if(c===','&&!q){row.push(cur);cur='';continue}if((c==='\n'||c==='\r')&&!q){if(c==='\r'&&n==='\n')i++;row.push(cur);if(row.some(x=>x.trim()))rows.push(row);row=[];cur='';continue}cur+=c}row.push(cur);if(row.some(x=>x.trim()))rows.push(row);return rows}

<script>
(function(){

  const DEFAULT_KEY='sb_publishable_btkoyC4o37GZNUOFMKtasQ_KmLIrUVb';
  let client=null, currentUser=null;
  function esc(v){try{return String(v??'').replace(/[&<>\"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[ch]||ch))}catch(e){return ''}}
  function say(m){try{toast(m)}catch(e){alert(m)}}

  function makeUuid(){
    try { if (crypto && crypto.randomUUID) return crypto.randomUUID(); } catch(e) {}
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random()*16|0, v = c === 'x' ? r : (r&0x3|0x8);
      return v.toString(16);
    });
  }

      lat:l.lat||null,lng:l.lng||null,status:l.status||'fresh',source:l.source||'manual',territory:l.territory||'',assigned_agent:l.assigned_agent||'',assigned_user_email:l.assigned_user_email||'',assigned_user_id:l.assigned_user_id||'',monthly_bill:l.monthly_bill||'',heating_bill:l.heating_bill||'',credit:l.credit||'',roof_notes:l.roof_notes||'',notes:l.notes||'',solar_status:l.solar_status||'',heating_type:l.heating_type||'',hvac_opportunity:l.hvac_opportunity||'',callback_due:l.callback_due||'',appt_time:l.appt_time||'',bbl:l.bbl||'',raw_data:l,updated_at:l.updated_at||new Date().toISOString()
    }

  function fromCloud(row){

    return {...r,id:r.id||row.local_id,first:r.first||row.first||'',last:r.last||row.last||'',phone:r.phone||row.phone||'',email:r.email||row.email||'',addr:r.addr||row.addr||'',city:r.city||row.city||'',boro:r.boro||row.boro||'',zip:r.zip||row.zip||'',lat:r.lat||row.lat,lng:r.lng||row.lng,status:r.status||row.status||'fresh',updated_at:row.updated_at||r.updated_at||new Date().toISOString()}
  }
  function setCloudStatus(m,kind=''){const el=document.getElementById('m2CloudStatus'); if(el){el.textContent=m; el.className='sub '+kind;} localStorage.setItem('m2_last_cloud_status_v1',m)}
  async function testCloud(){try{client=null;const s=sb(); if(!s)return; setCloudStatus('Testing Supabase connection...'); const {data,error}=await s.from('leads').select('local_id').limit(1); if(error) throw error; await refreshUser(); setCloudStatus('✓ Supabase connected. '+(currentUser?('Logged in as '+currentUser.email):'Not logged in yet.'),'good'); say('✓ Supabase connected')}catch(e){setCloudStatus('Supabase test failed: '+e.message,'bad'); say('Supabase test failed: '+e.message)}}
  async function signUp(){try{const email=document.getElementById('sbEmail')?.value.trim(), pw=document.getElementById('sbPassword')?.value; if(!email||!pw)return say('Enter email and password'); const s=sb(); const {data,error}=await s.auth.signUp({email,password:pw}); if(error)throw error; currentUser=data.user; saveCfg({email}); setCloudStatus('✓ Account created. If email confirmation is on, confirm email then log in.','good'); say('✓ Supabase account created')}catch(e){setCloudStatus('Signup failed: '+e.message,'bad'); say('Signup failed: '+e.message)}}
  async function login(){try{const email=document.getElementById('sbEmail')?.value.trim(), pw=document.getElementById('sbPassword')?.value; if(!email||!pw)return say('Enter email and password'); const s=sb(); const {data,error}=await s.auth.signInWithPassword({email,password:pw}); if(error)throw error; currentUser=data.user; saveCfg({email}); setCloudStatus('✓ Logged into Supabase as '+email,'good'); say('✓ Logged into Supabase'); renderCloudPanel();}catch(e){setCloudStatus('Login failed: '+e.message,'bad'); say('Login failed: '+e.message)}}

  async function pushLeads(){try{const s=sb(); if(!s)return; await refreshUser(); if(!currentUser && !confirm('You are not logged into Supabase. Try sync anyway?'))return; const rows=(state.leads||[]).map(cloudLead); if(!rows.length)return say('No leads to sync yet.'); setCloudStatus('Syncing '+rows.length+' local leads up to Supabase...'); const tid=await ensureCloudTeam(); const del=await s.from('leads').delete().eq('team_id',tid); if(del.error)throw del.error; for(let i=0;i<rows.length;i+=500){const {error}=await s.from('leads').insert(rows.slice(i,i+500)); if(error)throw error; setCloudStatus('Synced '+Math.min(i+500,rows.length)+' of '+rows.length+' leads...')} setCloudStatus('✓ Synced '+rows.length+' leads to Supabase.','good'); say('✓ Leads synced to Supabase')}catch(e){setCloudStatus('Lead sync failed: '+e.message,'bad'); say('Lead sync failed: '+e.message)}}

  async function syncAgents(){try{const s=sb(); if(!s)return; const tid=await ensureCloudTeam(); const list=(account().agents||[]).map(a=>({id:String(a.id||('a_'+Date.now())),team_id:tid,name:a.name||'',email:(a.email||'').toLowerCase(),pin:a.pin||'',territory:a.territory||'',active:true,updated_at:new Date().toISOString()})); setCloudStatus('Syncing '+list.length+' agent login(s)...'); await s.from('agent_accounts').delete().eq('team_id',tid); if(list.length){const {error}=await s.from('agent_accounts').insert(list); if(error)throw error;} setCloudStatus('✓ Agent logins synced to Supabase.','good'); say('✓ Agents synced')}catch(e){setCloudStatus('Agent sync failed: '+e.message,'bad'); say('Agent sync failed: '+e.message)}}
  async function syncMaster(){try{const s=sb(); if(!s)return; let a=account(), sess=session(); const tid=await ensureCloudTeam(); const row={team_id:tid,name:a.master_name||sess.name||settings().agent_name||'Master',email:(a.master_email||cfg().email||document.getElementById('sbEmail')?.value||'').toLowerCase(),pin:a.master_pin||'',active:true,updated_at:new Date().toISOString()}; if(!row.email||!row.pin)return say('Save Master email/PIN in Account Access first, or enter email here.'); setCloudStatus('Syncing master login...'); await s.from('master_accounts').delete().eq('team_id',tid); const {error}=await s.from('master_accounts').insert([row]); if(error)throw error; setCloudStatus('✓ Master login synced to Supabase.','good'); say('✓ Master synced')}catch(e){setCloudStatus('Master sync failed: '+e.message,'bad'); say('Master sync failed: '+e.message)}}
  function sqlText(){return `-- M2 CRM Supabase Setup\ncreate table if not exists leads (\n  local_id text primary key,\n  team_id text, first text, last text, phone text, email text, addr text, city text, boro text, zip text,\n  lat double precision, lng double precision, status text, source text, territory text, assigned_agent text, assigned_user_email text, assigned_user_id text,\n  monthly_bill text, heating_bill text, credit text, roof_notes text, notes text, solar_status text, heating_type text, hvac_opportunity text,\n  callback_due text, appt_time text, bbl text, raw_data jsonb, updated_at timestamptz default now()\n);\ncreate table if not exists agent_accounts (id text primary key, team_id uuid references teams(id) on delete cascade, name text, email text, pin text, territory text, active boolean default true, created_at timestamptz default now(), updated_at timestamptz default now());\ncreate table if not exists master_accounts (id bigint generated by default as identity primary key, team_id uuid references teams(id) on delete cascade, name text, email text, pin text, active boolean default true, created_at timestamptz default now(), updated_at timestamptz default now());\nalter table leads enable row level security; alter table agent_accounts enable row level security; alter table master_accounts enable row level security;\ndrop policy if exists "m2 leads open beta" on leads; create policy "m2 leads open beta" on leads for all using (true) with check (true);\ndrop policy if exists "m2 agents open beta" on agent_accounts; create policy "m2 agents open beta" on agent_accounts for all using (true) with check (true);\ndrop policy if exists "m2 masters open beta" on master_accounts; create policy "m2 masters open beta" on master_accounts for all using (true) with check (true);`}
  function downloadSQL(){const blob=new Blob([sqlText()],{type:'text/sql'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='m2-supabase-setup.sql';a.click();setTimeout(()=>URL.revokeObjectURL(url),800);say('SQL setup downloaded')}
  function saveCloudCfg(){
    let team = document.getElementById('sbTeam')?.value.trim();
    if(!isUuid(team)) team = localTeamId();
    document.getElementById('sbTeam') && (document.getElementById('sbTeam').value = team);
    saveCfg({url:document.getElementById('sbUrl')?.value.trim(),anon_key:document.getElementById('sbAnon')?.value.trim(),team_id:team,email:document.getElementById('sbEmail')?.value.trim()});
    try { const a = account(); a.team_id = team; localStorage.setItem('m2_account_access_v1', JSON.stringify(a)); } catch(e) {}
    client=null;setCloudStatus('✓ Supabase settings saved with valid Team UUID. Test connection next.','good');say('✓ Supabase settings saved')
  }
  function cloudHTML(){let c=cfg(); return `<div class="card internal-hide" id="m2SupabasePanel"><h3>☁️ Supabase Cloud Sync</h3><p class="sub">This is the cloud sync section. Add your Supabase URL + anon key, log in, then push/pull leads. This keeps the map and original CRM features intact.</p><div class="form-row"><label>Supabase URL</label><input id="sbUrl" value="${esc(c.url||DEFAULT_URL)}" placeholder="https://xxxx.supabase.co"></div><div class="form-row"><label>Supabase anon / publishable key</label><input id="sbAnon" value="${esc(c.anon_key||DEFAULT_KEY)}" placeholder="sb_publishable... or eyJ..."></div><div class="form-grid-2"><div class="form-row"><label>Team UUID</label><input id="sbTeam" value="${esc(isUuid(c.team_id)?c.team_id:localTeamId())}" placeholder="auto-generated UUID"></div><div class="form-row"><label>Email</label><input id="sbEmail" value="${esc(c.email||'')}"></div></div><div class="form-row"><label>Password</label><input type="password" id="sbPassword" placeholder="Supabase password"></div><div class="action-grid"><button class="purple" data-cloud="saveCfg">Save Cloud Info</button><button class="blue" data-cloud="test">Test Connection</button><button class="green" data-cloud="login">Log In</button><button data-cloud="signup">Create Account</button><button class="gold" data-cloud="push">Sync Leads Up</button><button class="blue" data-cloud="pull">Load Cloud Leads</button><button data-cloud="agents">Sync Agents</button><button data-cloud="master">Sync Master</button><button data-cloud="logout">Log Out</button><button data-cloud="sql">Download SQL Setup</button></div><p id="m2CloudStatus" class="sub">${esc(localStorage.getItem('m2_last_cloud_status_v1')||'Supabase panel ready. If sync fails, run the SQL setup in Supabase first.')}</p></div>`}
  window.renderCloudPanel=function(){
    const stats=document.getElementById('statsView'); if(!stats)return;
    let old=document.getElementById('m2SupabasePanel'); if(old)old.remove();
    const settingsCard=[...stats.querySelectorAll('.card')].find(x=>/Settings/i.test(x.textContent||''));
    if(settingsCard) settingsCard.insertAdjacentHTML('afterend',cloudHTML()); else stats.insertAdjacentHTML('afterbegin',cloudHTML());
    refreshUser().then(()=>{const el=document.getElementById('m2CloudStatus'); if(el&&currentUser)el.textContent='Logged into Supabase as '+currentUser.email;}).catch(()=>{});
  };
  const oldRender=window.renderStats||renderStats;
  try{window.renderStats=function(){oldRender.apply(this,arguments);setTimeout(renderCloudPanel,30)}; renderStats=window.renderStats;}catch(e){}
  document.addEventListener('click',function(e){const b=e.target.closest('[data-cloud]'); if(!b)return; e.preventDefault(); e.stopPropagation(); const a=b.dataset.cloud; if(a==='saveCfg')saveCloudCfg(); else if(a==='test')testCloud(); else if(a==='signup')signUp(); else if(a==='login')login(); else if(a==='logout')logout(); else if(a==='push')pushLeads(); else if(a==='pull')pullLeads(); else if(a==='agents')syncAgents(); else if(a==='master')syncMaster(); else if(a==='sql')downloadSQL();},true);
  window.addEventListener('load',()=>setTimeout(renderCloudPanel,900));
})();
</script>
